# ═══════════════════════════════════════════════════════
# GRAP Platform — Docker Compose
# All inter-service calls use Docker DNS service names.
# ═══════════════════════════════════════════════════════
version: "3.9"

x-common-env: &common-env
  KAFKA_BROKERS: kafka:9092
  MONGO_URI: mongodb://mongodb:27017/grap
  REDIS_URL: redis://redis:6379
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ─── Infrastructure ────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: grap-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: grap-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: grap-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka-topics.sh:/scripts/kafka-topics.sh:ro
    entrypoint: ["/bin/bash", "/scripts/kafka-topics.sh"]
    restart: "no"

  mongodb:
    image: mongo:7
    container_name: grap-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grap-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Observability ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: grap-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grap-grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/home.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  # ─── Backend Services ──────────────────────────────
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: grap-api-gateway
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-secret}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
    ports:
      - "3001:3001"
    restart: unless-stopped

  dfa-engine:
    build:
      context: ./apps/dfa-engine
      dockerfile: Dockerfile
    container_name: grap-dfa-engine
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      CLAIM_GATE_MINUTES: ${CLAIM_GATE_MINUTES:-60}
      CLAIM_GATE_THRESHOLD: ${CLAIM_GATE_THRESHOLD:-0.85}
    restart: unless-stopped

  weather-ingestion:
    build:
      context: ./services/weather-ingestion
      dockerfile: Dockerfile
    container_name: grap-weather-ingestion
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENMETEO_BASE_URL: ${OPENMETEO_BASE_URL:-https://flood-api.open-meteo.com/v1/flood}
      CPCB_API_KEY: ${CPCB_API_KEY:-}
      POLL_INTERVAL_SEC: ${WEATHER_POLL_INTERVAL_SEC:-300}
      METRICS_PORT: 8002
    ports:
      - "8002:8002"
    restart: unless-stopped

  fraud-engine:
    build:
      context: ./services/fraud-engine
      dockerfile: Dockerfile
    container_name: grap-fraud-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      FRAUD_REJECT_THRESHOLD: ${FRAUD_REJECT_THRESHOLD:-0.75}
      OPENCELLID_API_KEY: ${OPENCELLID_API_KEY:-}
      METRICS_PORT: 8003
    ports:
      - "8003:8003"
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: grap-payment-service
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      <<: *common-env
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_xxxxxxxxxxxx}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      MAX_RETRIES: ${RAZORPAY_MAX_RETRIES:-3}
    restart: unless-stopped

  ml-pipeline:
    build:
      context: ./services/ml-pipeline
      dockerfile: Dockerfile
    container_name: grap-ml-pipeline
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      TWEEDIE_POWER: ${TWEEDIE_POWER:-1.67}
      TWEEDIE_ALPHA: ${TWEEDIE_ALPHA:-0.01}
      VIF_THRESHOLD: ${VIF_THRESHOLD:-5.0}
      METRICS_PORT: 8004
    ports:
      - "8004:8004"
    restart: unless-stopped

  risk-scorer:
    build:
      context: ./services/flink-jobs
      dockerfile: Dockerfile
    container_name: grap-risk-scorer
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      EMA_ALPHA: ${EMA_ALPHA:-0.30}
    ports:
      - "8081:8081"
    restart: unless-stopped

  # ─── Data Seeds (run once) ─────────────────────────
  seed:
    build:
      context: ./data
      dockerfile: Dockerfile
    container_name: grap-seed
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    profiles:
      - seed
    restart: "no"

volumes:
  zookeeper_data:
  kafka_data:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:
