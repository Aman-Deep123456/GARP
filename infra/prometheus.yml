global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:3001"]
    metrics_path: /metrics

  - job_name: "flink"
    static_configs:
      - targets: ["flink-jobmanager:8081"]
    metrics_path: /metrics

  - job_name: "weather-ingestion"
    static_configs:
      - targets: ["weather-ingestion:8002"]
    metrics_path: /metrics

  - job_name: "fraud-engine"
    static_configs:
      - targets: ["fraud-engine:8003"]
    metrics_path: /metrics

  - job_name: "ml-pipeline"
    static_configs:
      - targets: ["ml-pipeline:8004"]
    metrics_path: /metrics
